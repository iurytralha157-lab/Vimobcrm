services:
  web:
    image: ${VIMOB_WEB_IMAGE:-ghcr.io/OWNER/vimob-crm-web:latest}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      NEXT_PUBLIC_VIMOB_API_URL: ${NEXT_PUBLIC_VIMOB_API_URL}
      VIMOB_API_URL: ${VIMOB_INTERNAL_API_URL:-http://api:8081}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-Vimob CRM <naoresponde@vimobcrm.com.br>}
      RESEND_REPLY_TO: ${RESEND_REPLY_TO:-suporte@vimobcrm.com.br}
      RESEND_WEBHOOK_SECRET: ${RESEND_WEBHOOK_SECRET:-}
      EMAIL_ASSET_BASE_URL: ${EMAIL_ASSET_BASE_URL:-https://vimobcrm.com.br}
      EMAIL_INTERNAL_SECRET: ${EMAIL_INTERNAL_SECRET:-}
    ports:
      - "${WEB_PORT:-3000}:3000"
    networks:
      - vimob

  api:
    image: ${VIMOB_API_IMAGE:-ghcr.io/OWNER/vimob-crm-api:latest}
    restart: unless-stopped
    environment:
      API_ENV: production
      API_HOST: 0.0.0.0
      API_PORT: 8081
      API_LOG_LEVEL: ${API_LOG_LEVEL:-info}
      API_CORS_ALLOWED_ORIGINS: ${API_CORS_ALLOWED_ORIGINS}
      SUPABASE_PROJECT_URL: ${SUPABASE_PROJECT_URL}
      SUPABASE_JWKS_URL: ${SUPABASE_JWKS_URL:-}
      SUPABASE_JWT_ISSUER: ${SUPABASE_JWT_ISSUER:-}
      SUPABASE_JWT_AUDIENCE: ${SUPABASE_JWT_AUDIENCE:-authenticated}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_MAX_CONNS: ${DATABASE_MAX_CONNS:-20}
      DATABASE_MIN_CONNS: ${DATABASE_MIN_CONNS:-2}
      DATABASE_MAX_CONN_LIFETIME: ${DATABASE_MAX_CONN_LIFETIME:-30m}
      DATABASE_MAX_CONN_IDLE_TIME: ${DATABASE_MAX_CONN_IDLE_TIME:-5m}
      DATABASE_HEALTH_TIMEOUT: ${DATABASE_HEALTH_TIMEOUT:-3s}
      ASAAS_API_KEY: ${ASAAS_API_KEY:-}
      ASAAS_BASE_URL: ${ASAAS_BASE_URL:-https://api.asaas.com/v3}
    ports:
      - "${API_PUBLIC_PORT:-8081}:8081"
    networks:
      - vimob

networks:
  vimob:
    name: vimob
