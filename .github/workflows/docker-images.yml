name: Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  WEB_IMAGE: ${{ github.repository_owner }}/vimob-crm-web
  API_IMAGE: ${{ github.repository_owner }}/vimob-crm-api

jobs:
  build-and-push:
    name: Build and push images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.API_IMAGE }}:latest
            ${{ env.REGISTRY }}/${{ env.API_IMAGE }}:${{ github.sha }}

      - name: Build and push Web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: true
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_VIMOB_API_URL=${{ vars.NEXT_PUBLIC_VIMOB_API_URL }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.WEB_IMAGE }}:latest
            ${{ env.REGISTRY }}/${{ env.WEB_IMAGE }}:${{ github.sha }}
