name: Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  WEB_IMAGE: ${{ github.repository_owner }}/vimob-crm-web
  API_IMAGE: ${{ github.repository_owner }}/vimob-crm-api

jobs:
  build-and-push:
    name: Build and push images
    runs-on: ubuntu-latest
    env:
      WEB_NEXT_PUBLIC_SUPABASE_URL: ${{ vars.VIMOB_NEXT_PUBLIC_SUPABASE_URL || secrets.VIMOB_NEXT_PUBLIC_SUPABASE_URL || 'https://iemalzlfnbouobyjwlwi.supabase.co' }}
      WEB_NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.VIMOB_NEXT_PUBLIC_SUPABASE_ANON_KEY || secrets.VIMOB_NEXT_PUBLIC_SUPABASE_ANON_KEY || 'sb_publishable_AnQ_6OJi0LuPUyxFh7rVwA_biv5WTyf' }}
      WEB_NEXT_PUBLIC_VIMOB_API_URL: ${{ vars.VIMOB_NEXT_PUBLIC_API_URL || secrets.VIMOB_NEXT_PUBLIC_API_URL || 'https://api.vimobcrm.com.br' }}
      WEB_NEXT_PUBLIC_SITE_URL: ${{ vars.VIMOB_NEXT_PUBLIC_SITE_URL || secrets.VIMOB_NEXT_PUBLIC_SITE_URL || 'https://app.vimobcrm.com.br' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate web build variables
        shell: bash
        run: |
          missing=0
          if [ -z "$WEB_NEXT_PUBLIC_SUPABASE_URL" ]; then
            echo "::error::Missing NEXT_PUBLIC_SUPABASE_URL in GitHub Actions variables or secrets."
            missing=1
          fi
          if [ -z "$WEB_NEXT_PUBLIC_SUPABASE_ANON_KEY" ]; then
            echo "::error::Missing NEXT_PUBLIC_SUPABASE_ANON_KEY in GitHub Actions variables or secrets."
            missing=1
          fi
          if [ -z "$WEB_NEXT_PUBLIC_VIMOB_API_URL" ]; then
            echo "::error::Missing NEXT_PUBLIC_VIMOB_API_URL in GitHub Actions variables or secrets."
            missing=1
          fi
          exit "$missing"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.API_IMAGE }}:latest
            ${{ env.REGISTRY }}/${{ env.API_IMAGE }}:${{ github.sha }}

      - name: Build and push Web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: true
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ env.WEB_NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ env.WEB_NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_VIMOB_API_URL=${{ env.WEB_NEXT_PUBLIC_VIMOB_API_URL }}
            NEXT_PUBLIC_SITE_URL=${{ env.WEB_NEXT_PUBLIC_SITE_URL }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.WEB_IMAGE }}:latest
            ${{ env.REGISTRY }}/${{ env.WEB_IMAGE }}:${{ github.sha }}
