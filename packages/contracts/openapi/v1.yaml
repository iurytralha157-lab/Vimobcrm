components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    OrganizationIdHeader:
      name: X-Organization-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: Active organization when the user belongs to more than one organization.
    PathId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DashboardDateFrom:
      name: dateFrom
      in: query
      schema:
        type: string
        format: date-time
    DashboardDateTo:
      name: dateTo
      in: query
      schema:
        type: string
        format: date-time
    DashboardPipelineId:
      name: pipelineId
      in: query
      schema:
        type: string
        format: uuid
    DashboardTeamId:
      name: teamId
      in: query
      schema:
        type: string
        format: uuid
    DashboardUserId:
      name: userId
      in: query
      schema:
        type: string
        format: uuid
    DashboardSource:
      name: source
      in: query
      schema:
        type: string
    DashboardCampaignId:
      name: campaignId
      in: query
      schema:
        type: string
    DashboardAdSetId:
      name: adSetId
      in: query
      schema:
        type: string
    DashboardAdId:
      name: adId
      in: query
      schema:
        type: string
    DashboardTagId:
      name: tagId
      in: query
      schema:
        type: string
        format: uuid
    DashboardDealStatus:
      name: dealStatus
      in: query
      schema:
        type: string
        enum: [open, won, lost]
    DashboardSearchQuery:
      name: searchQuery
      in: query
      schema:
        type: string
  responses:
    APIError:
      description: Standard API error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/APIErrorEnvelope"
  schemas:
    APIErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            requestId:
              type: string
    Property:
      type: object
      additionalProperties: true
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        code:
          type: string
        title:
          type: string
        tipo_de_imovel:
          type: string
        tipo_de_negocio:
          type: string
        status:
          type: string
        bairro:
          type: string
        cidade:
          type: string
        uf:
          type: string
        preco:
          type: [string, number, "null"]
        valor_locacao:
          type: [string, number, "null"]
        cadastrado_por:
          type: [string, "null"]
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    PropertyListResponse:
      type: object
      required: [data, total, limit, offset]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Property"
        total:
          type: integer
          format: int64
        limit:
          type: integer
        offset:
          type: integer
    PropertyResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/Property"
    PropertyImageUpload:
      type: object
      required: [url, path, bucket, contentType, size]
      properties:
        url:
          type: string
          format: uri
        path:
          type: string
        bucket:
          type: string
          enum: [properties]
        contentType:
          type: string
          enum: [image/jpeg, image/png, image/webp, image/gif]
        size:
          type: integer
          format: int64
    PropertyImageUploadResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/PropertyImageUpload"
    PropertyCaptor:
      type: object
      required: [id]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: [string, "null"]
        email:
          type: [string, "null"]
          format: email
        whatsapp:
          type: [string, "null"]
        avatar_url:
          type: [string, "null"]
          format: uri
    PropertySiteInfo:
      type: object
      properties:
        subdomain:
          type: [string, "null"]
        custom_domain:
          type: [string, "null"]
        domain_verified:
          type: [boolean, "null"]
    PropertySummary:
      type: object
      required: [id]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: [string, "null"]
        title:
          type: [string, "null"]
        preco:
          type: [number, "null"]
    UserSummary:
      type: object
      required: [id]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: [string, "null"]
        avatar_url:
          type: [string, "null"]
          format: uri
    PropertyMutationRequest:
      type: object
      minProperties: 1
      additionalProperties: true
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 4000
        tipo_de_imovel:
          type: string
        tipo_de_negocio:
          type: string
        status:
          type: string
        descricao:
          type: string
        bairro:
          type: string
        cidade:
          type: string
        uf:
          type: string
        quartos:
          type: [integer, "null"]
        suites:
          type: [integer, "null"]
        banheiros:
          type: [integer, "null"]
        vagas:
          type: [integer, "null"]
        preco:
          type: [string, number, "null"]
        valor_locacao:
          type: [string, number, "null"]
    PropertyCatalogItem:
      type: object
      required: [id, organization_id, name]
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        name:
          type: string
        icon:
          type: [string, "null"]
        created_at:
          type: string
    PropertyCatalogListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/PropertyCatalogItem"
    PropertyCatalogItemResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/PropertyCatalogItem"
    PropertyCatalogCreateRequest:
      type: object
      additionalProperties: false
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        icon:
          type: [string, "null"]
          maxLength: 80
    PropertyCatalogSeedRequest:
      type: object
      additionalProperties: false
      required: [names]
      properties:
        names:
          type: array
          minItems: 1
          maxItems: 100
          items:
            type: string
            minLength: 1
            maxLength: 120
    PropertyCity:
      type: object
      required: [id, organization_id, name]
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        name:
          type: string
        uf:
          type: [string, "null"]
        is_active:
          type: boolean
        created_at:
          type: string
    PropertyNeighborhood:
      type: object
      required: [id, organization_id, name]
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        city_id:
          type: [string, "null"]
          format: uuid
        name:
          type: string
        is_active:
          type: boolean
        created_at:
          type: string
        city:
          $ref: "#/components/schemas/PropertyCity"
    PropertyCondominium:
      type: object
      required: [id, organization_id, name]
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        city_id:
          type: [string, "null"]
          format: uuid
        neighborhood_id:
          type: [string, "null"]
          format: uuid
        name:
          type: string
        address:
          type: [string, "null"]
        latitude:
          type: [number, "null"]
        longitude:
          type: [number, "null"]
        is_active:
          type: boolean
        created_at:
          type: string
        city:
          $ref: "#/components/schemas/PropertyCity"
        neighborhood:
          $ref: "#/components/schemas/PropertyNeighborhood"
    PropertyCityListResponse:
      type: object
      required: [data]
      properties:
