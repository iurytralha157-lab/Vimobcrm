openapi: 3.1.0
info:
  title: Vimob API
  version: 0.1.0
  description: Backend contract for Vimob CRM.
servers:
  - url: http://localhost:8081
security:
  - bearerAuth: []
paths:
  /healthz:
    get:
      summary: Liveness check
      security: []
      responses:
        "200":
          description: API process is alive.
  /readyz:
    get:
      summary: Readiness check
      security: []
      responses:
        "200":
          description: API can reach dependencies.
  /v1/me:
    get:
      summary: Current authenticated user and tenant context
      parameters:
        - $ref: "#/components/parameters/OrganizationIdHeader"
      responses:
        "200":
          description: Current user and resolved context.
  /v1/lead-enrichments:
    get:
      summary: List card enrichments for visible leads
      parameters:
        - $ref: "#/components/parameters/OrganizationIdHeader"
        - name: ids
          in: query
          schema:
            type: string
          description: Comma-separated lead ids. Repeated `id` query params are also accepted.
        - name: id
          in: query
          schema:
            type: array
            items:
              type: string
              format: uuid
          style: form
          explode: true
      responses:
        "200":
          description: Lead enrichment list scoped by organization and lead visibility.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/LeadEnrichment"
  /v1/pipeline-board:
    get:
      summary: Get pipeline stages with visible leads and counts
      parameters:
        - $ref: "#/components/parameters/OrganizationIdHeader"
        - name: pipelineId
          in: query
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 12
      responses:
        "200":
          description: Pipeline board data.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/PipelineBoardStage"
  /v1/pipeline-stage-leads:
    get:
      summary: List more visible leads for one pipeline stage
      parameters:
        - $ref: "#/components/parameters/OrganizationIdHeader"
        - name: pipelineId
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: stageId
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 12
      responses:
        "200":
          description: Stage lead page.
          content:
            application/json:
              schema:
                type: object
                required: [stageId, leads]
                properties:
                  stageId:
                    type: string
                    format: uuid
                  leads:
                    type: array
                    items:
                      $ref: "#/components/schemas/PipelineBoardLead"
  /v1/pipeline-stage-counts:
    get:
      summary: Count visible leads by stage with pipeline filters
      parameters:
        - $ref: "#/components/parameters/OrganizationIdHeader"
        - name: pipelineId
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: stageIds
          in: query
          required: true
          schema:
            type: string
          description: Comma-separated stage ids.
      responses:
        "200":
          description: Counts keyed by stage id.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    additionalProperties:
                      type: integer
                      format: int64
  /v1/lead-meta-filters:
    get:
      summary: List campaign/adset/ad options from visible lead metadata
      parameters:
        - $ref: "#/components/parameters/OrganizationIdHeader"
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date-time
        - name: dateTo
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Meta Ads filter options.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/LeadMetaFilters"
  /v1/dashboard/stats:
    get:
      summary: Get dashboard KPI stats for visible leads
      parameters:
        - $ref: "#/components/parameters/OrganizationIdHeader"
        - $ref: "#/components/parameters/DashboardDateFrom"
        - $ref: "#/components/parameters/DashboardDateTo"
        - $ref: "#/components/parameters/DashboardTeamId"
        - $ref: "#/components/parameters/DashboardUserId"
        - $ref: "#/components/parameters/DashboardSource"
        - $ref: "#/components/parameters/DashboardCampaignId"
        - $ref: "#/components/parameters/DashboardAdSetId"
        - $ref: "#/components/parameters/DashboardAdId"
        - $ref: "#/components/parameters/DashboardTagId"
        - $ref: "#/components/parameters/DashboardDealStatus"
        - $ref: "#/components/parameters/DashboardSearchQuery"
      responses:
        "200":
          description: Dashboard KPI stats.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStatsResponse"
  /v1/dashboard/funnel:
    get:
      summary: Get dashboard funnel counts by pipeline stage
      parameters:
        - $ref: "#/components/parameters/OrganizationIdHeader"
        - $ref: "#/components/parameters/DashboardDateFrom"
        - $ref: "#/components/parameters/DashboardDateTo"
        - $ref: "#/components/parameters/DashboardPipelineId"
        - $ref: "#/components/parameters/DashboardTeamId"
        - $ref: "#/components/parameters/DashboardUserId"
        - $ref: "#/components/parameters/DashboardSource"
        - $ref: "#/components/parameters/DashboardCampaignId"
        - $ref: "#/components/parameters/DashboardAdSetId"
        - $ref: "#/components/parameters/DashboardAdId"
        - $ref: "#/components/parameters/DashboardTagId"
        - $ref: "#/components/parameters/DashboardDealStatus"
        - $ref: "#/components/parameters/DashboardSearchQuery"
      responses:
        "200":
          description: Funnel data.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardFunnelResponse"
  /v1/dashboard/sources:
    get:
      summary: Get dashboard lead counts by source
      parameters:
        - $ref: "#/components/parameters/OrganizationIdHeader"
        - $ref: "#/components/parameters/DashboardDateFrom"
        - $ref: "#/components/parameters/DashboardDateTo"
        - $ref: "#/components/parameters/DashboardPipelineId"
        - $ref: "#/components/parameters/DashboardTeamId"
        - $ref: "#/components/parameters/DashboardUserId"
        - $ref: "#/components/parameters/DashboardSource"
        - $ref: "#/components/parameters/DashboardCampaignId"
        - $ref: "#/components/parameters/DashboardAdSetId"
        - $ref: "#/components/parameters/DashboardAdId"
        - $ref: "#/components/parameters/DashboardTagId"
        - $ref: "#/components/parameters/DashboardDealStatus"
        - $ref: "#/components/parameters/DashboardSearchQuery"
      responses:
        "200":
          description: Source data.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSourcesResponse"
  /v1/dashboard/top-brokers:
    get:
      summary: Get top brokers from visible closed leads
      parameters:
        - $ref: "#/components/parameters/OrganizationIdHeader"
        - $ref: "#/components/parameters/DashboardDateFrom"
        - $ref: "#/components/parameters/DashboardDateTo"
        - $ref: "#/components/parameters/DashboardTeamId"
        - $ref: "#/components/parameters/DashboardUserId"
        - $ref: "#/components/parameters/DashboardSource"
        - $ref: "#/components/parameters/DashboardCampaignId"
        - $ref: "#/components/parameters/DashboardAdSetId"
        - $ref: "#/components/parameters/DashboardAdId"
        - $ref: "#/components/parameters/DashboardTagId"
        - $ref: "#/components/parameters/DashboardDealStatus"
        - $ref: "#/components/parameters/DashboardSearchQuery"
      responses:
        "200":
          description: Top brokers.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardTopBrokersResponse"
  /v1/dashboard/upcoming-tasks:
    get:
      summary: Get upcoming open lead tasks
      parameters:
        - $ref: "#/components/parameters/OrganizationIdHeader"
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 5
      responses:
        "200":
          description: Upcoming tasks.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardUpcomingTasksResponse"
  /v1/dashboard/deals-evolution:
    get:
      summary: Get dashboard deals evolution chart data
      parameters:
        - $ref: "#/components/parameters/OrganizationIdHeader"
        - $ref: "#/components/parameters/DashboardDateFrom"
        - $ref: "#/components/parameters/DashboardDateTo"
        - $ref: "#/components/parameters/DashboardTeamId"
        - $ref: "#/components/parameters/DashboardUserId"
        - $ref: "#/components/parameters/DashboardSource"
        - $ref: "#/components/parameters/DashboardCampaignId"
        - $ref: "#/components/parameters/DashboardAdSetId"
        - $ref: "#/components/parameters/DashboardAdId"
        - $ref: "#/components/parameters/DashboardTagId"
        - $ref: "#/components/parameters/DashboardDealStatus"
        - $ref: "#/components/parameters/DashboardSearchQuery"
      responses:
        "200":
          description: Deals evolution data.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardDealsEvolutionResponse"
  /v1/leads:
    get:
      summary: List leads visible to the current user
      parameters:
        - $ref: "#/components/parameters/OrganizationIdHeader"
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: search
          in: query
          schema:
            type: string
            maxLength: 100
        - name: stageId
          in: query
          schema:
            type: string
            format: uuid
        - name: assignedUserId
          in: query
          schema:
            type: string
            format: uuid
        - name: dealStatus
          in: query
          schema:
            type: string
            enum: [open, won, lost]
      responses:
        "200":
          description: Paginated lead list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadListResponse"
    post:
      summary: Create a lead in the current organization
      parameters:
        - $ref: "#/components/parameters/OrganizationIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLeadRequest"
      responses:
        "201":
          description: Lead created or existing lead reentry registered.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateLeadResponse"
        "400":
          $ref: "#/components/responses/APIError"
        "403":
          $ref: "#/components/responses/APIError"
  /v1/leads/{id}:
    get:
      summary: Get a lead visible to the current user
      parameters:
        - $ref: "#/components/parameters/OrganizationIdHeader"
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Lead detail.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Lead"
        "404":
          $ref: "#/components/responses/APIError"
    patch:
      summary: Update a lead in the current organization
      parameters:
        - $ref: "#/components/parameters/OrganizationIdHeader"
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLeadRequest"
      responses:
        "200":
          description: Lead updated.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Lead"
        "400":
          $ref: "#/components/responses/APIError"
        "403":
          $ref: "#/components/responses/APIError"
        "404":
          $ref: "#/components/responses/APIError"
    delete:
      summary: Delete a lead in the current organization
      parameters:
        - $ref: "#/components/parameters/OrganizationIdHeader"
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Lead deleted.
        "403":
          $ref: "#/components/responses/APIError"
        "404":
          $ref: "#/components/responses/APIError"
  /v1/leads/{id}/move-stage:
    post:
      summary: Move a lead to another pipeline stage
      parameters:
        - $ref: "#/components/parameters/OrganizationIdHeader"
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoveLeadStageRequest"
      responses:
        "200":
          description: Lead moved.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Lead"
        "400":
          $ref: "#/components/responses/APIError"
        "403":
          $ref: "#/components/responses/APIError"
        "404":
          $ref: "#/components/responses/APIError"
  /v1/leads/{id}/assign:
    post:
      summary: Transfer or clear the lead assignee
      parameters:
        - $ref: "#/components/parameters/OrganizationIdHeader"
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignLeadRequest"
      responses:
        "200":
          description: Lead assignee updated.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Lead"
        "400":
          $ref: "#/components/responses/APIError"
        "403":
          $ref: "#/components/responses/APIError"
        "404":
          $ref: "#/components/responses/APIError"
  /v1/leads/{id}/redistribute:
    post:
      summary: Assign a lead using the active round-robin queue
      parameters:
        - $ref: "#/components/parameters/OrganizationIdHeader"
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Round-robin assignment result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoundRobinResult"
        "403":
          $ref: "#/components/responses/APIError"
        "404":
          $ref: "#/components/responses/APIError"
  /v1/leads/{id}/tags:
    post:
      summary: Attach a tag to a lead
      parameters:
        - $ref: "#/components/parameters/OrganizationIdHeader"
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadTagRequest"
      responses:
        "201":
          description: Tag attached.
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
        "400":
          $ref: "#/components/responses/APIError"
        "403":
          $ref: "#/components/responses/APIError"
        "404":
          $ref: "#/components/responses/APIError"
        "409":
          $ref: "#/components/responses/APIError"
  /v1/leads/{id}/tags/{tagId}:
    delete:
      summary: Remove a tag from a lead
      parameters:
        - $ref: "#/components/parameters/OrganizationIdHeader"
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: tagId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Tag removed or was not attached.
        "400":
          $ref: "#/components/responses/APIError"
        "403":
          $ref: "#/components/responses/APIError"
        "404":
          $ref: "#/components/responses/APIError"
  /v1/properties:
    get:
      summary: List properties in the current organization
      parameters:
        - $ref: "#/components/parameters/OrganizationIdHeader"
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: search
          in: query
          schema:
            type: string
            maxLength: 120
        - name: tipo_de_negocio
          in: query
          schema:
            type: string
            maxLength: 80
        - name: tipo_de_imovel
          in: query
          schema:
            type: string
            maxLength: 80
        - name: cidade
          in: query
          schema:
            type: string
            maxLength: 120
        - name: bairro
          in: query
          schema:
            type: string
            maxLength: 120
        - name: responsavel_id
          in: query
          schema:
            type: string
            format: uuid
        - name: quartos_min
          in: query
          schema:
            type: integer
            minimum: 1
        - name: suites_min
          in: query
          schema:
            type: integer
            minimum: 1
        - name: banheiros_min
          in: query
          schema:
            type: integer
            minimum: 1
        - name: valor_min
          in: query
          schema:
            type: number
            minimum: 0
        - name: valor_max
          in: query
          schema:
            type: number
            minimum: 0
      responses:
        "200":
          description: Paginated property list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyListResponse"
    post:
      summary: Create a property in the current organization
      parameters:
        - $ref: "#/components/parameters/OrganizationIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PropertyMutationRequest"
      responses:
        "201":
          description: Property created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyResponse"
        "400":
          $ref: "#/components/responses/APIError"
        "403":
          $ref: "#/components/responses/APIError"
  /v1/properties/{id}:
    get:
      summary: Get a property in the current organization
      parameters:
        - $ref: "#/components/parameters/OrganizationIdHeader"
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Property detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyResponse"
        "404":
          $ref: "#/components/responses/APIError"
    patch:
      summary: Update a property in the current organization
      parameters:
        - $ref: "#/components/parameters/OrganizationIdHeader"
        - $ref: "#/components/parameters/PathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PropertyMutationRequest"
      responses:
        "200":
          description: Property updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyResponse"
        "400":
          $ref: "#/components/responses/APIError"
        "403":
          $ref: "#/components/responses/APIError"
        "404":
          $ref: "#/components/responses/APIError"
    delete:
      summary: Delete a property in the current organization
      parameters:
        - $ref: "#/components/parameters/OrganizationIdHeader"
        - $ref: "#/components/parameters/PathId"
      responses:
        "204":
          description: Property deleted.
        "403":
          $ref: "#/components/responses/APIError"
        "404":
          $ref: "#/components/responses/APIError"
  /v1/property-images:
    post:
      summary: Upload a property image through the backend
      parameters:
        - $ref: "#/components/parameters/OrganizationIdHeader"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              additionalProperties: false
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: JPEG, PNG, WebP or GIF image up to 10MB.
                propertyId:
                  type: string
                  format: uuid
                  description: Optional property id. Omit while creating a new property.
      responses:
        "201":
          description: Image uploaded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyImageUploadResponse"
        "400":
          $ref: "#/components/responses/APIError"
        "403":
          $ref: "#/components/responses/APIError"
        "404":
          $ref: "#/components/responses/APIError"
  /v1/property-captors/{id}:
    get:
      summary: Get minimal captor data for property screens
      parameters:
        - $ref: "#/components/parameters/OrganizationIdHeader"
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Captor data or null when unavailable in the organization.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    oneOf:
                      - $ref: "#/components/schemas/PropertyCaptor"
                      - type: "null"
        "403":
          $ref: "#/components/responses/APIError"
  /v1/property-site-info:
    get:
      summary: Get active public site information for property links
      parameters:
        - $ref: "#/components/parameters/OrganizationIdHeader"
      responses:
        "200":
          description: Active organization site information or null.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    oneOf:
                      - $ref: "#/components/schemas/PropertySiteInfo"
                      - type: "null"
        "403":
          $ref: "#/components/responses/APIError"
  /v1/property-summaries:
    get:
      summary: List minimal property summaries by id
      parameters:
        - $ref: "#/components/parameters/OrganizationIdHeader"
        - name: ids
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated property ids. Repeated `id` query params are also accepted.
        - name: id
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
              format: uuid
          style: form
          explode: true
      responses:
        "200":
          description: Property summaries in the current organization.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/PropertySummary"
        "400":
          $ref: "#/components/responses/APIError"
        "403":
          $ref: "#/components/responses/APIError"
  /v1/user-summaries:
    get:
      summary: List minimal user summaries by id
      parameters:
        - $ref: "#/components/parameters/OrganizationIdHeader"
        - name: ids
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated user ids. Repeated `id` query params are also accepted.
        - name: id
          in: query
          required: false
          schema:
            type: array
            items:
              type: string
              format: uuid
          style: form
          explode: true
      responses:
        "200":
          description: User summaries visible in the current organization.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/UserSummary"
        "400":
          $ref: "#/components/responses/APIError"
        "403":
          $ref: "#/components/responses/APIError"
  /v1/property-types:
    get:
      summary: List property type catalog items
      parameters:
        - $ref: "#/components/parameters/OrganizationIdHeader"
      responses:
        "200":
